name: Render Quarto Site → GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:   # allow manual runs from the Actions tab

permissions:
  contents: write      # needed for peaceiris/actions-gh-pages

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      CONDA_PKGS_DIRS: /home/runner/conda-pkgs
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare cache directories
        run: |
          mkdir -p ~/R
          mkdir -p ~/.cache/pip
          mkdir -p "${CONDA_PKGS_DIRS}"

      # ── 2. System dependencies (needed before R pkg compilation) ────────────
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libcurl4-openssl-dev \
            libjpeg-dev \
            libpng-dev \
            libudunits2-dev \
            libgdal-dev \
            libgeos-dev \
            libproj-dev \
            libfontconfig1-dev \
            libfreetype6-dev \
            libharfbuzz-dev \
            libfribidi-dev \
            libxml2-dev \
            libssl-dev

      # ── 3. R setup ───────────────────────────────────────────────────────────
      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          # Keep R aligned with the current Bioconductor release used by
          # clusterProfiler/enrichplot/ggtree during site rendering.
          r-version: "4.5"
          use-public-rspm: true   # binary packages → faster install

      - name: Restore R package cache
        id: cache-r-packages
        uses: actions/cache/restore@v5
        with:
          path: ~/R          # same location setup-r uses; avoids env.R_LIBS_USER linter warning
          key: r-pkgs-${{ runner.os }}-r-4.5-${{ hashFiles('install_packages.R') }}
          restore-keys: |
            r-pkgs-${{ runner.os }}-r-4.5-
            r-pkgs-${{ runner.os }}-

      - name: Install R packages
        run: Rscript install_packages.R

      - name: Validate critical R packages
        run: |
          Rscript -e 'pkgs <- c("clusterProfiler", "enrichplot", "ggtree", "ggrepel"); invisible(lapply(pkgs, require, character.only = TRUE)); cat("Critical R packages load successfully\n")'

      - name: Save R package cache
        if: steps.cache-r-packages.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ~/R
          key: ${{ steps.cache-r-packages.outputs.cache-primary-key }}

      - name: Restore Python package cache
        id: cache-python-packages
        uses: actions/cache/restore@v5
        with:
          path: |
            ~/.cache/pip
            /home/runner/conda-pkgs
          key: py-pkgs-${{ runner.os }}-${{ hashFiles('environment.yml') }}
          restore-keys: |
            py-pkgs-${{ runner.os }}-

      # ── 4. Python / conda setup ──────────────────────────────────────────────
      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          activate-environment: jonsson-bioinfo
          environment-file: environment.yml
          auto-activate: false
          use-only-tar-bz2: true

      - name: Save Python package cache
        if: steps.cache-python-packages.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: |
            ~/.cache/pip
            /home/runner/conda-pkgs
          key: ${{ steps.cache-python-packages.outputs.cache-primary-key }}

      - name: Register Jupyter kernel
        shell: bash -l {0}
        run: |
          conda activate jonsson-bioinfo
          python -m ipykernel install --user --name jonsson-bioinfo --display-name jonsson-bioinfo
          jupyter kernelspec list

      # ── 5. Synthetic data generation ─────────────────────────────────────────
      - name: Generate synthetic R data (all templates)
        run: |
          for script in templates/*/data/simulate_data.R; do
            template_dir=$(dirname "$(dirname "$script")")
            echo "▶ $script  (cwd: $template_dir)"
            (cd "$template_dir" && Rscript data/simulate_data.R)
          done
        shell: bash

      - name: Generate synthetic Python data (template 08)
        shell: bash -l {0}
        run: |
          conda activate jonsson-bioinfo
          (cd templates/08_vcf-mutation-analysis && python data/simulate_data.py)

      # ── 6. Quarto setup ──────────────────────────────────────────────────────
      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: "1.5.57"

      - name: Validate Python render environment
        shell: bash -l {0}
        run: |
          conda activate jonsson-bioinfo
          python - <<'PY'
          import ipykernel
          import nbconvert
          import nbformat
          import vcfpy
          import yaml

          print("Python render dependencies load successfully")
          PY
          jupyter kernelspec list
          quarto check jupyter

      # ── 7. Render site ───────────────────────────────────────────────────────
      - name: Render Quarto site
        run: bash scripts/ci-preflight.sh --render-only

      # ── 8. Deploy to GitHub Pages ─────────────────────────────────────────────
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          publish_branch: gh-pages
          force_orphan: true          # keep gh-pages branch clean
          commit_message: "Deploy rendered site [skip ci]"
