name: Render Quarto Site → GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      page:
        description: |
          Render a single page (leave empty for full site).
          Use the path relative to repo root, e.g.:
            templates/05_phylo-geographic/template.qmd
        required: false
        default: ''

permissions:
  contents: write      # needed for peaceiris/actions-gh-pages

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      R_LIBS_USER: /home/runner/R/library

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare R library directory
        run: mkdir -p "${R_LIBS_USER}"

      # ── 2. System dependencies (needed before R pkg compilation) ────────────
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libcurl4-openssl-dev \
            libjpeg-dev \
            libpng-dev \
            libudunits2-dev \
            libgdal-dev \
            libgeos-dev \
            libproj-dev \
            libfontconfig1-dev \
            libfreetype6-dev \
            libharfbuzz-dev \
            libfribidi-dev \
            libxml2-dev \
            libssl-dev

      # ── 3. R setup ───────────────────────────────────────────────────────────
      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.5"
          use-public-rspm: true   # binary packages → faster install

      - name: Restore R package cache
        id: cache-r-packages
        uses: actions/cache/restore@v5
        with:
          path: ${{ env.R_LIBS_USER }}
          key: r-pkgs-${{ runner.os }}-r-4.5-${{ hashFiles('install_packages.R') }}
          restore-keys: |
            r-pkgs-${{ runner.os }}-r-4.5-
            r-pkgs-${{ runner.os }}-

      - name: Install R packages
        run: Rscript install_packages.R

      - name: Validate R packages (template-aware)
        run: Rscript scripts/validate_packages.R

      - name: Save R package cache
        if: steps.cache-r-packages.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ${{ env.R_LIBS_USER }}
          key: ${{ steps.cache-r-packages.outputs.cache-primary-key }}

      # ── 4. Synthetic data generation ─────────────────────────────────────────
      # When a single page is targeted (workflow_dispatch with page input), only
      # run simulate_data for that template directory — skips the other 7 scripts
      # and cuts several minutes off targeted troubleshooting runs.
      - name: Generate synthetic R data
        shell: bash
        run: |
          PAGE="${{ github.event.inputs.page }}"
          if [[ -n "$PAGE" ]]; then
            TMPL_DIR=$(dirname "$PAGE")
            SCRIPT="$TMPL_DIR/data/simulate_data.R"
            if [[ -f "$SCRIPT" ]]; then
              echo "▶ $SCRIPT  (targeted, cwd: $TMPL_DIR)"
              (cd "$TMPL_DIR" && Rscript data/simulate_data.R)
            else
              echo "No simulate_data.R for $TMPL_DIR — skipping data generation"
            fi
          else
            for script in templates/*/data/simulate_data.R; do
              template_dir=$(dirname "$(dirname "$script")")
              echo "▶ $script  (cwd: $template_dir)"
              (cd "$template_dir" && Rscript data/simulate_data.R)
            done
          fi

      # ── 5. Quarto setup ──────────────────────────────────────────────────────
      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: "1.5.57"

      # ── 6. Render site ───────────────────────────────────────────────────────
      - name: Render Quarto site
        run: |
          PAGE="${{ github.event.inputs.page }}"
          if [ -n "$PAGE" ]; then
            bash scripts/ci-preflight.sh --render-only --keep-going --page "$PAGE"
          else
            bash scripts/ci-preflight.sh --render-only --keep-going
          fi

      # ── 7. Deploy to GitHub Pages ─────────────────────────────────────────────
      - name: Deploy to GitHub Pages
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.page == '')
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          publish_branch: gh-pages
          force_orphan: true
          commit_message: "Deploy rendered site [skip ci]"
